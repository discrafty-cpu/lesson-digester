<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Viewer - The Lesson Digester</title>
    <link rel="stylesheet" href="../css/digester-theme.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0f1729;
            color: #e8eaf0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem 0;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #e8eaf0;
        }

        .hero p {
            font-size: 1.1rem;
            color: #8892a8;
        }

        /* Viewer Grid */
        .viewer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .viewer-panel {
            background-color: #1a2340;
            border-radius: 8px;
            padding: 1.5rem;
            border: 1px solid #2d3a5c;
        }

        .viewer-panel h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .viewer-panel.before h2 {
            color: #f87171;
        }

        .viewer-panel.after h2 {
            color: #34d399;
        }

        .viewer-panel.before h2::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: #f87171;
            border-radius: 2px;
        }

        .viewer-panel.after h2::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: #34d399;
            border-radius: 2px;
        }

        .slide-thumb {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: linear-gradient(135deg, #1e2761 0%, #2d3a5c 100%);
            border-radius: 6px;
            border: 2px dashed #2d3a5c;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8892a8;
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        .slide-nav {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .slide-nav button {
            min-width: 40px;
            height: 40px;
            border: 1px solid #2d3a5c;
            background-color: #0f1729;
            color: #8892a8;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .slide-nav button:hover {
            background-color: #1a2340;
            border-color: #3B82F6;
            color: #3B82F6;
        }

        .slide-nav button.active {
            background-color: #3B82F6;
            color: white;
            border-color: #3B82F6;
        }

        /* Footer */
        footer {
            border-top: 1px solid #2d3a5c;
            padding-top: 2rem;
            margin-top: 3rem;
            text-align: center;
            color: #8892a8;
            font-size: 0.9rem;
        }

        footer p {
            margin-bottom: 0.5rem;
        }

        @media (max-width: 768px) {
            .viewer-grid {
                grid-template-columns: 1fr;
            }

            .hero h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Hero Section -->
        <div class="hero">
            <h1>Slide Viewer</h1>
            <p>Compare before and after — side by side</p>
        </div>

        <!-- Viewer Grid -->
        <div class="viewer-grid">
            <!-- Before Panel -->
            <div class="viewer-panel before">
                <h2>Before</h2>
                <div class="slide-thumb">
                    Slide 1 — Before Version
                </div>
                <div class="slide-nav">
                    <button class="active">1</button>
                    <button>2</button>
                    <button>3</button>
                    <button>4</button>
                    <button>5</button>
                </div>
            </div>

            <!-- After Panel -->
            <div class="viewer-panel after">
                <h2>After</h2>
                <div class="slide-thumb">
                    Slide 1 — After Version
                </div>
                <div class="slide-nav">
                    <button class="active">1</button>
                    <button>2</button>
                    <button>3</button>
                    <button>4</button>
                    <button>5</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 The Lesson Digester. Compare, analyze, and improve lesson design.</p>
    </footer>

    <script src="../js/digester-core.js"></script>
</body>
</html>
